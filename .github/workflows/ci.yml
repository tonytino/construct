name: CI

on:
  push:
    branches: ["main"]
  pull_request:

# Least privilege: this workflow only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type, Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # pnpm version comes from `packageManager` in package.json
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & format check
        run: pnpm exec biome check .

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm exec vitest run

      # The `secrets` context is not allowed in step-level `if` conditions, so we
      # detect the optional E2E secret here and gate later steps on this output.
      - name: Check for E2E database secret
        id: e2e
        env:
          E2E_DATABASE_URL: ${{ secrets.CI_E2E_DATABASE_URL }}
        run: |
          if [ -n "$E2E_DATABASE_URL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright browsers
        if: steps.e2e.outputs.enabled == 'true'
        run: pnpm test:e2e:install

      - name: E2E tests
        if: steps.e2e.outputs.enabled == 'true'
        run: pnpm test:e2e
        env:
          DATABASE_URL: ${{ secrets.CI_E2E_DATABASE_URL }}
