name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci:
    name: Lint, Type, Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from `packageManager` in package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & format check
        run: pnpm exec biome check .

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm exec vitest run

      # The `secrets` context is not allowed in step-level `if` conditions, so we
      # detect the optional E2E secret here and gate later steps on this output.
      - name: Check for E2E database secret
        id: e2e
        env:
          E2E_DATABASE_URL: ${{ secrets.CI_E2E_DATABASE_URL }}
        run: |
          if [ -n "$E2E_DATABASE_URL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright browsers
        if: steps.e2e.outputs.enabled == 'true'
        run: pnpm test:e2e:install

      - name: E2E tests
        if: steps.e2e.outputs.enabled == 'true'
        run: pnpm test:e2e
        env:
          DATABASE_URL: ${{ secrets.CI_E2E_DATABASE_URL }}
