name: Validate Template

on:
  pull_request:

jobs:
  validate:
    name: Scaffold & Verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from `packageManager` in package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      # Install template deps first (needed for scaffold script and to warm the pnpm store)
      - name: Install template dependencies
        run: pnpm install --frozen-lockfile

      # Copy the repo to a temp directory to scaffold without destroying the checkout.
      # We initialize git in the copy so `lefthook install` (run by `prepare`) has a
      # .git directory to write hooks into. Without this, pnpm install fails post-scaffold.
      - name: Copy template to temp directory
        run: |
          mkdir -p /tmp/scaffold-test
          rsync -a --exclude='.git' --exclude='node_modules' . /tmp/scaffold-test/
          git -C /tmp/scaffold-test init --quiet
          git -C /tmp/scaffold-test config user.email "ci@example.com"
          git -C /tmp/scaffold-test config user.name "CI"

      # Run scaffold with piped answers: yes -> project name -> description -> no (skip labels)
      - name: Scaffold a test project
        working-directory: /tmp/scaffold-test
        run: printf 'yes\nmy-test-app\nA CI test application\nno\n' | node scripts/scaffold.mjs

      # Verify the scaffold transformed AGENTS.md correctly
      - name: Verify AGENTS.md substitution
        working-directory: /tmp/scaffold-test
        run: |
          if head -1 AGENTS.md | grep -q "^# my-test-app$"; then
            echo "AGENTS.md heading substituted correctly"
          else
            echo "AGENTS.md heading was not substituted"
            echo "First line: $(head -1 AGENTS.md)"
            exit 1
          fi

      # Verify .construct metadata exists and constructVersion matches package.json.version
      # from the source template (captured before scaffold modifies package.json).
      - name: Verify .construct metadata
        working-directory: /tmp/scaffold-test
        run: |
          if [ ! -f .construct ]; then
            echo ".construct file missing"
            exit 1
          fi
          cat .construct
          EXPECTED=$(node -p "require('${{ github.workspace }}/package.json').version")
          ACTUAL=$(node -p "require('./.construct').constructVersion")
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "constructVersion mismatch: expected $EXPECTED, got $ACTUAL"
            exit 1
          fi
          echo "constructVersion matches package.json: $ACTUAL"

      # Verify scaffold self-destructed
      - name: Verify scaffold removed itself
        working-directory: /tmp/scaffold-test
        run: |
          if [ -f scripts/scaffold.mjs ]; then
            echo "scaffold.mjs should have been removed"
            exit 1
          fi
          echo "scaffold.mjs removed"

      # Install deps in the scaffolded project (lockfile is stale after scaffold changes package.json).
      # This triggers postinstall (tsr generate) and prepare (lefthook install).
      - name: Install scaffolded project dependencies
        working-directory: /tmp/scaffold-test
        run: pnpm install --no-frozen-lockfile

      - name: Preflight (lint, typecheck, unit tests)
        working-directory: /tmp/scaffold-test
        run: pnpm preflight

      - name: Build
        working-directory: /tmp/scaffold-test
        run: pnpm build

      - name: Install Playwright browsers
        if: ${{ secrets.CI_E2E_DATABASE_URL != '' }}
        working-directory: /tmp/scaffold-test
        run: pnpm test:e2e:install

      - name: E2E tests
        if: ${{ secrets.CI_E2E_DATABASE_URL != '' }}
        working-directory: /tmp/scaffold-test
        run: pnpm test:e2e
        env:
          DATABASE_URL: ${{ secrets.CI_E2E_DATABASE_URL }}
